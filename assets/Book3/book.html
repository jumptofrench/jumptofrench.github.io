<html lang="en">

<script>

    localStorage.getItem("jtf_book3_book") === "yes" ||
    localStorage.getItem("jtf_book3_both") === "yes";

  if (!ok) {
    window.location.replace("/index.html");
  }

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jump to French — Book 3</title>
<style>
@media (max-width: 700px) {
  .page-label,
  .cover,
  .cover-container,
  .viewer-header,
  .hero {
    display: none !important;
  }
}
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #e7e7e7;
  font-family: Arial, sans-serif;
  -webkit-user-select: none;
  user-select: none;
}

.viewer-shell {
  width: 100vw;
  height: 100vh;
  padding: 8px;
}

.viewer {
  width: 100%;
  height: 100%;
  background: #f4f4f4;
  border-radius: 22px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  touch-action: pan-y pinch-zoom;
}

.page-stage {
  position: absolute;
  inset: 0;
  padding: 6px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}

img {
  display: block;
  width: auto;
  height: 100%;
  max-width: 100%;
  max-height: 100%;
  -webkit-user-drag: none;
  user-select: none;
  pointer-events: none;
}

button {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 52px;
  height: 66px;
  border: 1px solid rgba(255,255,255,0.9);
  border-radius: 16px;
  background: rgba(30,30,30,0.55);
  color: #fff;
  font-size: 38px;
  font-weight: 700;
  line-height: 1;
  cursor: pointer;
  z-index: 3;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  box-shadow: 0 8px 18px rgba(0,0,0,0.18);
}

.left { left: 18px; }
.right { right: 18px; }

.page-label {
  position: absolute;
  top: 14px;
  background: rgba(255,255,255,0.96);
  padding: 10px 14px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 16px;
  z-index: 3;
  white-space: nowrap;
}

@media (max-width: 700px) {
  .viewer-shell {
    padding: 0;
  }

  .viewer {
    border-radius: 0;
  }

  .page-stage {
    padding: 0;
  }

  img {
    width: auto;
    height: 100%;
    object-fit: cover;
    object-position: center;
    max-width: none;
    max-height: none;
  }

  button {
    width: 52px;
    height: 52px;
    font-size: 34px;
    border-radius: 999px;
    background: rgba(20,20,20,0.62);
    border: 1px solid rgba(255,255,255,0.95);
  }

  .left {
    left: 8px !important;
  }

  .right {
    right: 8px !important;
  }
}
</style>
</head>
<body>

<div class="viewer-shell">
  <div class="viewer" id="viewer">
    <div class="page-label" id="label">Page 1</div>
    <button class="left" id="leftBtn" onclick="prev()">‹</button>

    <div class="page-stage">
      <img id="page" src="cover.png">
    </div>

    <button class="right" id="rightBtn" onclick="next()">›</button>
  </div>
</div>

<script>
let current = 0;
const total = 24;
let touchStartX = 0;
let touchStartY = 0;
let touchEndX = 0;
let touchEndY = 0;

function updatePositions() {
  if (window.innerWidth <= 700) return;

  const viewer = document.getElementById("viewer");
  const img = document.getElementById("page");
  const leftBtn = document.getElementById("leftBtn");
  const rightBtn = document.getElementById("rightBtn");
  const label = document.getElementById("label");

  const viewerRect = viewer.getBoundingClientRect();
  const imgRect = img.getBoundingClientRect();

  if (!imgRect.width) return;

  const gap = 10;

  const leftPos = imgRect.left - viewerRect.left - leftBtn.offsetWidth - gap;
  const rightPos = viewerRect.right - imgRect.right - rightBtn.offsetWidth - gap;

  leftBtn.style.left = Math.max(10, leftPos) + "px";
  rightBtn.style.right = Math.max(10, rightPos) + "px";

  const labelLeft = imgRect.left - viewerRect.left - label.offsetWidth - gap;
  label.style.left = Math.max(10, labelLeft) + "px";
}

function update() {
  const pageEl = document.getElementById("page");
  const labelEl = document.getElementById("label");

  if (current === 0) {
    pageEl.src = "cover.png";
    labelEl.textContent = "Cover";
  } else {
    pageEl.src = "pages/page-" + String(current).padStart(2, "0") + ".jpg";
    labelEl.textContent = "Page " + current + " / " + total;
  }

  requestAnimationFrame(updatePositions);
}

function next() {
  if (current < total) current++;
  update();
}

function prev() {
  if (current > 0) current--;
  update();
}

const viewer = document.getElementById("viewer");
viewer.addEventListener("touchstart", function (e) {
  const touch = e.changedTouches[0];
  touchStartX = touch.screenX;
  touchStartY = touch.screenY;
}, { passive: true });

viewer.addEventListener("touchend", function (e) {
  const touch = e.changedTouches[0];
  touchEndX = touch.screenX;
  touchEndY = touch.screenY;
  handleSwipe();
}, { passive: true });

function handleSwipe() {
  const dx = touchEndX - touchStartX;
  const dy = touchEndY - touchStartY;

  if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy)) return;

  if (dx < 0) {
    next();
  } else {
    prev();
  }
}

document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());
document.addEventListener("selectstart", e => e.preventDefault());

window.addEventListener("resize", updatePositions);
document.getElementById("page").addEventListener("load", updatePositions);

update();
</script>

</body>
</html>
