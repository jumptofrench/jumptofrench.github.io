<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixed Mobile Version</title>

<style>
html {
  height: 100%;
  height: -webkit-fill-available;
}

body {
  margin: 0;
  min-height: 100vh;
  min-height: 100dvh;
  min-height: -webkit-fill-available;
  font-family: Arial, sans-serif;
}

/* ===== MOBILE FIX ===== */
@media (max-width: 760px) {
  html, body {
    height: auto;
    min-height: 100%;
  }

  body {
    overflow-x: hidden;
    overflow-y: auto;
    display: block;
  }

  .app {
    display: grid;
    grid-template-columns: 1fr;
    height: auto;
    min-height: 100dvh;
    width: 100%;
  }

  .left,
  .chapter-column {
    height: auto;
    overflow: visible;
    border-right: none;
    border-bottom: 1px solid #d0d0d0;
  }

  .left {
    padding: 14px 14px calc(22px + env(safe-area-inset-bottom));
  }

  .chapter-column {
    padding: 12px 10px calc(22px + env(safe-area-inset-bottom));
  }

  .chapters-scroll {
    overflow: visible;
    height: auto;
  }

  .player {
    overflow: visible;
  }
}
</style>
</head>

<body>
<div class="app">
  <div class="left">
    <h2>Control Panel</h2>
    <p>This version fixes the mobile cut-off issue.</p>
  </div>

  <div class="chapter-column">
    <h3>Chapters</h3>
    <p>No more clipping on mobile.</p>
  </div>
</div>
</body>
</html>
