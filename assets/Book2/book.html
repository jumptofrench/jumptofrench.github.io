<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function () {
  const ok =
    localStorage.getItem("jtf_book1_book") === "yes" ||
    localStorage.getItem("jtf_book1_both") === "yes";

  if (!ok) {
    window.location.replace("/index.html");
  }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Viewer</title>
<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #e7e7e7;
  font-family: Arial, sans-serif;
  -webkit-user-select: none;
  user-select: none;
}

.viewer-shell {
  width: 100vw;
  height: 100vh;
  padding: 8px;
}

.viewer {
  width: 100%;
  height: 100%;
  background: #f4f4f4;
  border-radius: 22px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.page-stage {
  position: absolute;
  inset: 0;
  padding: 6px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}

img {
  display: block;
  width: auto;
  height: 100%;
  max-width: 100%;
  max-height: 100%;
  -webkit-user-drag: none;
  user-select: none;
  pointer-events: none;
}

button {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 52px;
  height: 66px;
  border: 1px solid #d5d5d5;
  border-radius: 16px;
  background: rgba(255,255,255,0.96);
  font-size: 38px;
  cursor: pointer;
  z-index: 3;
}

.left { left: 18px; }
.right { right: 18px; }

.page-label {
  position: absolute;
  top: 20px;
  background: rgba(255,255,255,0.96);
  padding: 8px 12px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 14px;
  z-index: 3;
}
</style>
</head>
<body>

<div class="viewer-shell">
  <div class="viewer" id="viewer">
    <div class="page-label" id="label">Page 1</div>
    <button class="left" id="leftBtn" onclick="prev()">‹</button>

    <div class="page-stage">
      <img id="page" src="cover.png">
    </div>

    <button class="right" id="rightBtn" onclick="next()">›</button>
  </div>
</div>

<script>
let current = 0;
const total = 24;

function updatePositions() {
  const viewer = document.getElementById("viewer");
  const img = document.getElementById("page");
  const leftBtn = document.getElementById("leftBtn");
  const rightBtn = document.getElementById("rightBtn");
  const label = document.getElementById("label");

  const viewerRect = viewer.getBoundingClientRect();
  const imgRect = img.getBoundingClientRect();

  if (!imgRect.width) return;

  const gap = 10;

  const leftPos = imgRect.left - viewerRect.left - leftBtn.offsetWidth - gap;
  const rightPos = viewerRect.right - imgRect.right - rightBtn.offsetWidth - gap;

  leftBtn.style.left = Math.max(10, leftPos) + "px";
  rightBtn.style.right = Math.max(10, rightPos) + "px";

  // adjusted closer (balanced)
  const labelLeft = imgRect.left - viewerRect.left - 110;
  label.style.left = Math.max(10, labelLeft) + "px";
}

function update() {
  const pageEl = document.getElementById("page");
  const labelEl = document.getElementById("label");

  if (current === 0) {
    pageEl.src = "cover.png";
    labelEl.textContent = "Cover";
  } else {
    pageEl.src = "pages/page-" + String(current).padStart(2, "0") + ".jpg";
    labelEl.textContent = "Page " + current + " / " + total;
  }
}

function next() {
  if (current < total) current++;
  update();
}

function prev() {
  if (current > 0) current--;
  update();
}

document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());
document.addEventListener("selectstart", e => e.preventDefault());

window.addEventListener("resize", updatePositions);
document.getElementById("page").addEventListener("load", updatePositions);

update();
</script>

</body>
</html>
